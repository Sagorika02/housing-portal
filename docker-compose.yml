version: "3.9"

services:

  housing-price-api:
    build: ./housing-price-api
    container_name: housing-price-api
    ports:
      - "8000:8000"
    networks:
      - housing-network

  property-estimator-api:
    build: ./property-estimator-api
    container_name: property-estimator-api
    ports:
      - "8001:8001"
    depends_on:
      - housing-price-api
    networks:
      - housing-network

  property-portal:
    build: ./property-portal
    container_name: property-portal
    ports:
      - "3000:3000"
    depends_on:
      - property-estimator-api
    networks:
      - housing-network

networks:
  housing-network:
    driver: bridge